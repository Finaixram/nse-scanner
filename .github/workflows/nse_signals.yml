name: NSE Telegram Signals

on:
  schedule:
    - cron: '15 3 * * 1-5'
    - cron: '45 3 * * 1-5'
    - cron: '15 4 * * 1-5'
    - cron: '45 4 * * 1-5'
    - cron: '15 5 * * 1-5'
    - cron: '45 5 * * 1-5'
    - cron: '15 6 * * 1-5'
    - cron: '45 6 * * 1-5'
    - cron: '15 7 * * 1-5'
    - cron: '45 7 * * 1-5'
    - cron: '15 8 * * 1-5'
    - cron: '45 8 * * 1-5'
    - cron: '15 9 * * 1-5'
    - cron: '45 9 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install deps
        run: pip install requests yfinance flask --break-system-packages -q

      - name: Send signal alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python signal_cron.py

      - name: Commit state
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          if [ -f last_signal.txt ]; then
            git add last_signal.txt
            if git diff --staged --quiet; then
              echo "No state change to commit"
            else
              git commit -m "chore: state [skip ci]"
              git pull --rebase origin main
              git push origin main
              echo "State pushed successfully"
            fi
          else
            echo "last_signal.txt not present this run (early exit before state write) - skipping commit"
          fi
